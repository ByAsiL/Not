<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070b10" />
  <title>İhale Hafızası</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <style>
    :root {
      --bg:#070b10; --panel:#111a24; --panel2:#0b1118; --card:#141f2b;
      --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.18);
      --text:#f8fafc; --muted:#94a3b8; --muted2:#64748b;
      --cyan:#22d3ee; --cyan2:#67e8f9; --yellow:#facc15; --red:#fb7185; --green:#34d399;
      --shadow:0 22px 60px rgba(0,0,0,.34);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    body:before { content:""; position:fixed; inset:0; pointer-events:none; background:radial-gradient(circle at 85% 0%,rgba(34,211,238,.12),transparent 30%),radial-gradient(circle at 0% 100%,rgba(59,130,246,.10),transparent 35%); }
    button,input,textarea,select { font:inherit; }
    button { cursor:pointer; }
    .app { position:relative; max-width:980px; margin:0 auto; min-height:100vh; padding:12px; }
    .top { border:1px solid var(--line); background:rgba(17,26,36,.94); border-radius:24px; padding:14px; box-shadow:var(--shadow); margin-bottom:12px; position:sticky; top:8px; z-index:5; backdrop-filter:blur(18px); }
    .toprow { display:flex; align-items:center; gap:12px; }
    .logo { width:50px; height:50px; border-radius:18px; border:0; background:var(--cyan); color:#061018; font-weight:950; font-size:18px; display:grid; place-items:center; flex:0 0 50px; }
    .brandbtn { text-align:left; background:transparent; border:0; color:inherit; padding:0; min-width:0; }
    .eyebrow { color:var(--cyan2); font-size:12px; font-weight:850; }
    h1,h2,h3,p { margin:0; }
    h1 { font-size:27px; line-height:1.05; letter-spacing:-.04em; }
    h2 { font-size:23px; line-height:1.08; letter-spacing:-.04em; }
    h3 { font-size:18px; line-height:1.15; letter-spacing:-.03em; }
    .muted { color:var(--muted); font-size:13px; line-height:1.5; }
    .search { margin-top:12px; position:relative; }
    .search input { width:100%; height:45px; border-radius:17px; border:1px solid var(--line); background:var(--panel2); color:#fff; outline:0; padding:0 14px 0 42px; font-weight:750; }
    .search span { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#64748b; }
    input:focus, textarea:focus, select:focus { border-color:rgba(34,211,238,.72); box-shadow:0 0 0 4px rgba(34,211,238,.10); }
    .page { display:none; }
    .page.active { display:block; }
    .homegrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .homecard { min-height:158px; border:1px solid var(--line); background:var(--card); border-radius:24px; padding:14px; color:inherit; text-align:left; box-shadow:var(--shadow); transition:.16s ease; }
    .homecard:active { transform:scale(.98); }
    .homeicon { width:48px; height:48px; border-radius:17px; display:grid; place-items:center; background:#0a1118; border:1px solid var(--line); font-size:25px; margin-bottom:16px; }
    .homecard .title { font-size:20px; font-weight:950; line-height:1.05; margin-bottom:8px; }
    .homecard .go { color:var(--cyan2); font-weight:950; font-size:13px; margin-top:14px; }
    .panel { border:1px solid var(--line); background:rgba(17,26,36,.94); border-radius:24px; padding:14px; box-shadow:var(--shadow); margin-bottom:12px; }
    .panelhead { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .back { border:0; border-radius:16px; background:rgba(255,255,255,.08); color:#fff; padding:11px 13px; font-weight:900; white-space:nowrap; }
    .btn { width:100%; border:0; border-radius:17px; padding:13px 14px; background:var(--cyan); color:#061018; font-weight:950; }
    .btn.secondary { background:rgba(255,255,255,.09); color:#fff; }
    .btnrow { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    label b { display:block; color:#cbd5e1; font-size:12px; margin:0 0 7px; }
    input,textarea,select { width:100%; border:1px solid var(--line); background:var(--panel2); color:#fff; border-radius:16px; padding:12px; outline:0; font-weight:700; }
    textarea { min-height:96px; resize:vertical; line-height:1.5; }
    .fields { display:grid; gap:10px; }
    @media(min-width:720px) { .fields { grid-template-columns:1fr 1fr; } .wide { grid-column:span 2; } }
    .list { display:grid; gap:9px; }
    .tenderrow { border:1px solid var(--line); background:var(--panel2); border-radius:20px; padding:14px; color:inherit; text-align:left; width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .tenderrow .ikn { font-size:21px; font-weight:950; letter-spacing:-.03em; }
    .tenderrow .days { margin-top:5px; font-size:13px; font-weight:850; }
    .tenderrow.future { border-color:rgba(250,204,21,.38); background:rgba(250,204,21,.08); }
    .tenderrow.future .days { color:var(--yellow); }
    .tenderrow.past { border-color:rgba(251,113,133,.36); background:rgba(251,113,133,.08); }
    .tenderrow.past .days { color:#fecdd3; }
    .tenderrow.done { border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.08); }
    .tenderrow.done .days { color:#86efac; }
    .tenderrow.unknown .days { color:#cbd5e1; }
    .badge { border-radius:999px; padding:6px 9px; background:rgba(255,255,255,.08); color:#cbd5e1; font-size:11px; font-weight:950; white-space:nowrap; }
    .summarygrid { display:grid; gap:9px; }
    @media(min-width:720px) { .summarygrid { grid-template-columns:1fr 1fr; } }
    .info { border:1px solid var(--line); background:var(--panel2); border-radius:18px; padding:12px; }
    .info .l { color:#94a3b8; font-size:12px; font-weight:900; margin-bottom:6px; }
    .info .v { color:#e2e8f0; font-weight:800; white-space:pre-wrap; line-height:1.45; }
    .sectiontitle { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:16px 0 8px; }
    .sectiontitle h3 { color:#fff; }
    .table { border:1px solid var(--line); border-radius:18px; overflow:hidden; background:var(--panel2); }
    .tr { display:grid; grid-template-columns:1.3fr .55fr .5fr 1fr; border-top:1px solid var(--line); }
    .tr:first-child { border-top:0; }
    .tr.head { background:rgba(34,211,238,.10); color:var(--cyan2); font-size:12px; font-weight:950; }
    .td { padding:10px; font-size:12px; line-height:1.35; border-left:1px solid var(--line); overflow-wrap:anywhere; }
    .td:first-child { border-left:0; }
    .tr:not(.head) .td { color:#dbeafe; font-weight:650; }
    .tr.two { grid-template-columns:.8fr 1.6fr; }
    .tr.risk { grid-template-columns:1.1fr .55fr 1.3fr; }
    .empty { border:1px dashed rgba(255,255,255,.18); background:var(--panel2); border-radius:20px; padding:20px; text-align:center; color:#94a3b8; font-weight:750; }
    .detailtop { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .smallpill { display:inline-flex; border-radius:999px; padding:6px 10px; background:rgba(34,211,238,.12); color:var(--cyan2); font-weight:950; font-size:12px; margin-bottom:10px; }
    .toast { position:fixed; left:50%; bottom:16px; transform:translateX(-50%); background:var(--cyan); color:#061018; border-radius:999px; padding:12px 16px; font-weight:950; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:.2s; z-index:50; }
    .toast.show { opacity:1; bottom:26px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="toprow">
        <button class="logo" onclick="go('home')">İH</button>
        <button class="brandbtn" onclick="go('home')">
          <div class="eyebrow">İhale takip uygulaması</div>
          <h1 id="title">Ana Menü</h1>
        </button>
      </div>
      <div class="search"><span>⌕</span><input id="search" placeholder="İKN ara..." oninput="render()" /></div>
    </header>

    <section id="home" class="page active"></section>
    <section id="add" class="page"></section>
    <section id="saved" class="page"></section>
    <section id="detail" class="page"></section>
  </div>
  <div id="toast" class="toast">Kaydedildi</div>

<script>
const STORAGE_KEY = "ihale-hafizasi-excel-v1";
const DEFAULT_DATA = {"tenders": [{"id": "sample-2026-000001", "ikn": "2026/000001", "ihaleTarihi": "2026-06-15T10:00", "kurum": "Örnek Kurum Müdürlüğü", "isAdi": "Örnek Okul Bakım Onarım İşi", "yer": "İstanbul", "yaklasikMaliyet": "5.250.000 TL KDV hariç", "onerilenTeklif": "4.890.000 TL", "teminat": "146.700 TL (%3)", "durum": "Takipte", "isDeneyimi": "Yapım işi / bakım onarım benzer iş", "ozet": "Bu örnek kayıt, uygulamada ihalenin nasıl görüneceğini göstermek için eklendi. Yeni kayıtlarda buradaki tüm alanlar senin ChatGPT’den aldığın notla dolacak.", "yapilacakIsler": [{"kalem": "Mevcut zemin kaplamalarının sökülmesi", "miktar": "350", "birim": "m²", "not": "Moloz nakli dahil"}, {"kalem": "Seramik kaplama yapılması", "miktar": "350", "birim": "m²", "not": "Malzeme + işçilik"}, {"kalem": "İç cephe boya yapılması", "miktar": "2.100", "birim": "m²", "not": "Astar + iki kat boya"}, {"kalem": "Elektrik priz ve anahtar yenileme", "miktar": "80", "birim": "adet", "not": "Marka şartnameye uygun"}], "satinAlinacaklar": [{"urun": "Seramik", "miktar": "385", "birim": "m²", "not": "%10 fire dahil"}, {"urun": "İç cephe boya", "miktar": "420", "birim": "kg", "not": "Renk kurum onaylı"}, {"urun": "Priz / anahtar grubu", "miktar": "80", "birim": "adet", "not": "Teknik şartnameye uygun"}, {"urun": "Alçı / tamir harcı", "miktar": "60", "birim": "torba", "not": "Yüzey düzeltme için"}], "maliyetKalemleri": [{"kalem": "İnşaat işleri", "metraj": "1", "birim": "grup", "tutar": "3.100.000 TL"}, {"kalem": "Elektrik işleri", "metraj": "1", "birim": "grup", "tutar": "620.000 TL"}, {"kalem": "Malzeme nakliye ve fire", "metraj": "1", "birim": "grup", "tutar": "410.000 TL"}, {"kalem": "İşçilik / SGK / genel gider", "metraj": "1", "birim": "grup", "tutar": "760.000 TL"}], "idariBilgiler": [{"baslik": "Teminat", "detay": "Teklifin en az %3’ü"}, {"baslik": "İş deneyimi", "detay": "İdari şartnameye göre kontrol edilecek"}, {"baslik": "Teklif geçerlilik", "detay": "Şartnameye göre takip edilecek"}, {"baslik": "Fiyat farkı", "detay": "İdari şartnameye göre kontrol edilecek"}], "riskler": [{"risk": "Metraj eksikliği", "onem": "Orta", "not": "Keşif ve mahal listesiyle tekrar kontrol edilmeli"}, {"risk": "Sınır değer", "onem": "Yüksek", "not": "Teklif sınır değer altına düşmemeli"}, {"risk": "Teknik şartname uyumu", "onem": "Yüksek", "not": "Malzeme marka/model uygunluğu kontrol edilmeli"}], "createdAt": "2026-05-29T00:00:00.000Z"}], "selectedId": "sample-2026-000001"};
const starterText = `İKN:
İhale tarihi:
Kurum:
İş adı:
Yer:
Yaklaşık maliyet:
Önerilen teklif:
Teminat:
İş deneyimi / benzer iş:
Özet:

YAPILACAK İŞLER:
- İş kalemi | miktar | birim | not

SATIN ALINACAKLAR:
- Ürün | miktar | birim | not

MALİYET KALEMLERİ:
- Kalem | metraj | birim | tutar

İDARİ BİLGİLER:
- Başlık | detay

RİSKLER:
- Risk | önem | not`;

let data = load();
let current = "home";
let draft = emptyTender();

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || structuredClone(DEFAULT_DATA); }
  catch(e) { return structuredClone(DEFAULT_DATA); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function uid() { return crypto && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2); }
function esc(v) { return String(v ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function q() { return document.getElementById("search").value.trim().toLocaleLowerCase("tr-TR"); }
function emptyTender() {
  return { id: uid(), ikn:"", ihaleTarihi:"", kurum:"", isAdi:"", yer:"", yaklasikMaliyet:"", onerilenTeklif:"", teminat:"Teklifin en az %3'ü", durum:"Takipte", isDeneyimi:"", ozet:"", yapilacakIsler:[], satinAlinacaklar:[], maliyetKalemleri:[], idariBilgiler:[], riskler:[], createdAt:new Date().toISOString() };
}
function filterTenders() {
  const s = q();
  let arr = data.tenders || [];
  if(s) arr = arr.filter(t => [t.ikn,t.kurum,t.isAdi,t.yer,t.durum].join(" ").toLocaleLowerCase("tr-TR").includes(s));
  return arr.sort(tenderSort);
}
function go(page) {
  current = page;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
  document.getElementById("title").textContent = page === "home" ? "Ana Menü" : page === "add" ? "İhale Kaydet" : page === "saved" ? "Kayıtlı İhaleler" : "İhale Detayı";
  window.scrollTo({ top:0, behavior:"smooth" });
  render();
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}
function daysInfo(t) {
  if(!t.ihaleTarihi) return { text:"Tarih yok", cls:"unknown" };
  const target = new Date(t.ihaleTarihi);
  if(Number.isNaN(target.getTime())) return { text:"Tarih okunamadı", cls:"unknown" };
  const now = new Date();
  const ms = 1000*60*60*24;
  const status = String(t.durum || "").toLocaleLowerCase("tr-TR");
  const doneGood = status.includes("kazan") || status.includes("sonuç") || status.includes("tamam");
  if(target >= now) {
    const d = Math.max(0, Math.ceil((target - now)/ms));
    return { text: d === 0 ? "Bugün ihale günü" : d + " gün kaldı", cls:"future" };
  }
  const d = Math.max(0, Math.ceil((now - target)/ms));
  return { text: d === 0 ? "Bugün geçti" : d + " gün geçti", cls: doneGood ? "done" : "past" };
}
function formatDate(v) {
  if(!v) return "-";
  const d = new Date(v);
  if(Number.isNaN(d.getTime())) return v;
  return new Intl.DateTimeFormat("tr-TR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" }).format(d);
}
function tenderSort(a,b) {
  if(!a.ihaleTarihi && !b.ihaleTarihi) return String(a.ikn).localeCompare(String(b.ikn), "tr");
  if(!a.ihaleTarihi) return 1;
  if(!b.ihaleTarihi) return -1;
  return new Date(a.ihaleTarihi) - new Date(b.ihaleTarihi);
}
function renderHome() {
  document.getElementById("home").innerHTML = `
    <div class="homegrid">
      <button class="homecard" onclick="go('add')">
        <div class="homeicon">📄</div>
        <div class="title">İhale Kaydet</div>
        <p class="muted">ChatGPT notunu yapıştır, ihale kaydı oluştur.</p>
        <div class="go">Bölüme gir →</div>
      </button>
      <button class="homecard" onclick="go('saved')">
        <div class="homeicon">🗂️</div>
        <div class="title">Kayıtlı İhaleler</div>
        <p class="muted">${data.tenders.length} ihale kayıtlı. İKN’ye dokun, ayrı detay sayfası açılsın.</p>
        <div class="go">Bölüme gir →</div>
      </button>
    </div>
    <div class="panel" style="margin-top:12px">
      <h2>Yeni mantık</h2>
      <p class="muted" style="margin-top:6px">Liste ekranında sadece İKN ve kalan/geçen gün görünür. İKN’ye tıklayınca yeni detay sayfasında Excel mantığında tüm işler, ürünler, maliyetler ve riskler açılır.</p>
    </div>
  `;
}
function renderAdd() {
  document.getElementById("add").innerHTML = `
    <div class="panel">
      <div class="panelhead">
        <div><h2>İhale Kaydet</h2><p class="muted">Benim verdiğim gelişmiş ihale notunu yapıştır veya alanları doldur.</p></div>
        <button class="back" onclick="go('home')">Ana Menü</button>
      </div>
      <label><b>ChatGPT ihale notu</b><textarea id="pasteBox">${esc(starterText)}</textarea></label>
      <div class="btnrow">
        <button class="btn secondary" onclick="parseBox()">Alanlara Dağıt</button>
        <button class="btn" onclick="saveTender()">İhaleyi Kaydet</button>
      </div>
    </div>
    <div class="panel">
      <div class="fields">
        ${field("ikn","İKN")}
        ${field("ihaleTarihi","İhale tarihi","datetime-local")}
        ${field("durum","Durum")}
        ${field("kurum","Kurum","text","wide")}
        ${field("isAdi","İş adı","text","wide")}
        ${field("yer","Yer")}
        ${field("yaklasikMaliyet","Yaklaşık maliyet")}
        ${field("onerilenTeklif","Önerilen teklif")}
        ${field("teminat","Teminat")}
        ${area("isDeneyimi","İş deneyimi / benzer iş")}
        ${area("ozet","Özet")}
        ${area("yapilacakIslerText","Yapılacak işler", rowsToText(draft.yapilacakIsler, ["kalem","miktar","birim","not"]))}
        ${area("satinAlinacaklarText","Satın alınacaklar", rowsToText(draft.satinAlinacaklar, ["urun","miktar","birim","not"]))}
        ${area("maliyetKalemleriText","Maliyet kalemleri", rowsToText(draft.maliyetKalemleri, ["kalem","metraj","birim","tutar"]))}
        ${area("idariBilgilerText","İdari bilgiler", rowsToText(draft.idariBilgiler, ["baslik","detay"]))}
        ${area("risklerText","Riskler", rowsToText(draft.riskler, ["risk","onem","not"]))}
      </div>
    </div>
  `;
  fillDraft();
}
function field(id,label,type="text",cls="") { return `<label class="${cls}"><b>${label}</b><input id="f_${id}" type="${type}"></label>`; }
function area(id,label,value="") { return `<label class="wide"><b>${label}</b><textarea id="f_${id}">${esc(value)}</textarea></label>`; }
function fillDraft() {
  ["ikn","ihaleTarihi","durum","kurum","isAdi","yer","yaklasikMaliyet","onerilenTeklif","teminat","isDeneyimi","ozet"].forEach(k => {
    const el = document.getElementById("f_" + k);
    if(el) el.value = draft[k] || "";
  });
}
function readDraft() {
  ["ikn","ihaleTarihi","durum","kurum","isAdi","yer","yaklasikMaliyet","onerilenTeklif","teminat","isDeneyimi","ozet"].forEach(k => {
    const el = document.getElementById("f_" + k);
    if(el) draft[k] = el.value;
  });
  draft.yapilacakIsler = parseRows(document.getElementById("f_yapilacakIslerText").value, ["kalem","miktar","birim","not"]);
  draft.satinAlinacaklar = parseRows(document.getElementById("f_satinAlinacaklarText").value, ["urun","miktar","birim","not"]);
  draft.maliyetKalemleri = parseRows(document.getElementById("f_maliyetKalemleriText").value, ["kalem","metraj","birim","tutar"]);
  draft.idariBilgiler = parseRows(document.getElementById("f_idariBilgilerText").value, ["baslik","detay"]);
  draft.riskler = parseRows(document.getElementById("f_risklerText").value, ["risk","onem","not"]);
}
function rowsToText(rows, keys) {
  return (rows || []).map(r => keys.map(k => r[k] || "").join(" | ")).join("\n");
}
function parseRows(text, keys) {
  return String(text || "").split(/\n+/).map(x => x.trim()).filter(Boolean).map(line => {
    line = line.replace(/^[-•]\s*/, "");
    const parts = line.split("|").map(x => x.trim());
    const obj = {};
    keys.forEach((k,i) => obj[k] = parts[i] || "");
    return obj;
  });
}
function parseTenderText(text) {
  const t = emptyTender();
  const sections = { yapilacakIsler:"", satinAlinacaklar:"", maliyetKalemleri:"", idariBilgiler:"", riskler:"" };
  let currentSection = "";
  const map = [
    [["İKN","IKN"],"ikn"],
    [["İhale tarihi","Teklif tarihi","Teklif son tarihi","Tarih"],"ihaleTarihi"],
    [["Kurum"],"kurum"],
    [["İş adı","İşin adı","Is adi"],"isAdi"],
    [["Yer","İl","İl / ilçe"],"yer"],
    [["Yaklaşık maliyet","Kurum yaklaşık maliyeti"],"yaklasikMaliyet"],
    [["Önerilen teklif","Teklif","Fiyat teklifi"],"onerilenTeklif"],
    [["Teminat"],"teminat"],
    [["İş deneyimi / benzer iş","İş deneyimi","Benzer iş"],"isDeneyimi"],
    [["Özet"],"ozet"],
    [["Durum"],"durum"]
  ];
  text.split(/\n/).forEach(raw => {
    const line = raw.trim();
    if(!line) return;
    const up = line.toLocaleUpperCase("tr-TR").replace(/İ/g,"I");
    if(up.startsWith("YAPILACAK")) { currentSection = "yapilacakIsler"; return; }
    if(up.startsWith("SATIN")) { currentSection = "satinAlinacaklar"; return; }
    if(up.startsWith("MALIYET") || up.startsWith("MALİYET")) { currentSection = "maliyetKalemleri"; return; }
    if(up.startsWith("IDARI") || up.startsWith("İDARI") || up.startsWith("İDARİ")) { currentSection = "idariBilgiler"; return; }
    if(up.startsWith("RISK") || up.startsWith("RİSK")) { currentSection = "riskler"; return; }
    const idx = line.indexOf(":");
    if(idx >= 0 && !currentSection) {
      const label = line.slice(0,idx).trim().toLocaleLowerCase("tr-TR");
      const value = line.slice(idx+1).trim();
      const found = map.find(([keys]) => keys.some(k => k.toLocaleLowerCase("tr-TR") === label));
      if(found) t[found[1]] = normalizeDateValue(value, found[1]);
      return;
    }
    if(currentSection) sections[currentSection] += line + "\n";
  });
  t.yapilacakIsler = parseRows(sections.yapilacakIsler, ["kalem","miktar","birim","not"]);
  t.satinAlinacaklar = parseRows(sections.satinAlinacaklar, ["urun","miktar","birim","not"]);
  t.maliyetKalemleri = parseRows(sections.maliyetKalemleri, ["kalem","metraj","birim","tutar"]);
  t.idariBilgiler = parseRows(sections.idariBilgiler, ["baslik","detay"]);
  t.riskler = parseRows(sections.riskler, ["risk","onem","not"]);
  return t;
}
function normalizeDateValue(value, field) {
  if(field !== "ihaleTarihi") return value;
  if(!value) return "";
  const iso = value.match(/(20\d{2})-(\d{2})-(\d{2})[ T]?(\d{2})?:?(\d{2})?/);
  if(iso) return `${iso[1]}-${iso[2]}-${iso[3]}T${iso[4]||"10"}:${iso[5]||"00"}`;
  const tr = value.match(/(\d{1,2})[./](\d{1,2})[./](20\d{2}).*?(\d{1,2})?:?(\d{2})?/);
  if(tr) return `${tr[3]}-${tr[2].padStart(2,"0")}-${tr[1].padStart(2,"0")}T${(tr[4]||"10").padStart(2,"0")}:${tr[5]||"00"}`;
  return value;
}
function parseBox() {
  draft = parseTenderText(document.getElementById("pasteBox").value);
  renderAdd();
  toast("Alanlara dağıtıldı");
}
function saveTender() {
  readDraft();
  if(!draft.ikn) { toast("İKN boş bırakılamaz"); return; }
  const item = {...draft, id: draft.id || uid(), createdAt: draft.createdAt || new Date().toISOString()};
  data.tenders = [item, ...data.tenders.filter(t => t.id !== item.id && t.ikn !== item.ikn)];
  data.selectedId = item.id;
  save();
  draft = emptyTender();
  toast("İhale kaydedildi");
  openDetail(item.id);
}
function renderSaved() {
  const list = filterTenders();
  document.getElementById("saved").innerHTML = `
    <div class="panel">
      <div class="panelhead">
        <div><h2>Kayıtlı İhaleler</h2><p class="muted">Listede sadece İKN ve kalan/geçen gün var. Tıklayınca ayrı detay sayfası açılır.</p></div>
        <button class="back" onclick="go('home')">Ana Menü</button>
      </div>
      <div class="list">
        ${list.length ? list.map(row).join("") : `<div class="empty">Kayıtlı ihale bulunamadı.</div>`}
      </div>
    </div>
  `;
}
function row(t) {
  const d = daysInfo(t);
  return `<button class="tenderrow ${d.cls}" onclick="openDetail('${t.id}')">
    <div><div class="ikn">${esc(t.ikn)}</div><div class="days">${esc(d.text)}</div></div>
    <span class="badge">${esc(t.durum || "Takipte")}</span>
  </button>`;
}
function openDetail(id) {
  data.selectedId = id;
  save();
  current = "detail";
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("detail").classList.add("active");
  document.getElementById("title").textContent = "İhale Detayı";
  renderDetail();
  window.scrollTo({top:0, behavior:"smooth"});
}
function renderDetail() {
  const t = data.tenders.find(x => x.id === data.selectedId);
  document.getElementById("detail").innerHTML = t ? detail(t) : `<div class="panel"><div class="empty">İhale bulunamadı.</div></div>`;
}
function detail(t) {
  const d = daysInfo(t);
  return `
    <div class="panel">
      <div class="detailtop">
        <div>
          <div class="smallpill">${esc(t.ikn)}</div>
          <h2>${esc(t.isAdi || "İhale detayı")}</h2>
          <p class="muted" style="margin-top:6px">${esc(d.text)} • ${esc(t.durum || "Takipte")}</p>
        </div>
        <button class="back" onclick="go('saved')">Liste</button>
      </div>
      <div class="summarygrid" style="margin-top:12px">
        ${info("İhale tarihi", formatDate(t.ihaleTarihi))}
        ${info("Kurum", t.kurum)}
        ${info("Yer", t.yer)}
        ${info("Yaklaşık maliyet", t.yaklasikMaliyet)}
        ${info("Önerilen teklif", t.onerilenTeklif)}
        ${info("Teminat", t.teminat)}
        ${info("İş deneyimi / benzer iş", t.isDeneyimi)}
        ${info("Özet", t.ozet)}
      </div>
    </div>
    ${tablePanel("Yapılacak İşler", ["Kalem","Miktar","Birim","Not"], t.yapilacakIsler, ["kalem","miktar","birim","not"])}
    ${tablePanel("Satın Alınacaklar", ["Ürün","Miktar","Birim","Not"], t.satinAlinacaklar, ["urun","miktar","birim","not"])}
    ${tablePanel("Metraj / Maliyet", ["Kalem","Metraj","Birim","Tutar"], t.maliyetKalemleri, ["kalem","metraj","birim","tutar"])}
    ${twoColPanel("İdari Şartname / Kritik Bilgiler", t.idariBilgiler)}
    ${riskPanel("Riskler", t.riskler)}
    <div class="panel"><button class="btn secondary" onclick="copyTender('${t.id}')">Bu ihaleyi kopyala</button></div>
  `;
}
function info(label,value) { return `<div class="info"><div class="l">${esc(label)}</div><div class="v">${esc(value || "-")}</div></div>`; }
function tablePanel(title, headers, rows, keys) {
  return `<div class="panel"><div class="sectiontitle"><h3>${esc(title)}</h3><span class="badge">${(rows||[]).length} satır</span></div>
    ${(rows||[]).length ? `<div class="table"><div class="tr head">${headers.map(h=>`<div class="td">${esc(h)}</div>`).join("")}</div>${rows.map(r=>`<div class="tr">${keys.map(k=>`<div class="td">${esc(r[k]||"-")}</div>`).join("")}</div>`).join("")}</div>` : `<div class="empty">Bu bölüm için kayıt yok.</div>`}
  </div>`;
}
function twoColPanel(title, rows) {
  return `<div class="panel"><div class="sectiontitle"><h3>${esc(title)}</h3><span class="badge">${(rows||[]).length} satır</span></div>
    ${(rows||[]).length ? `<div class="table"><div class="tr head two"><div class="td">Başlık</div><div class="td">Detay</div></div>${rows.map(r=>`<div class="tr two"><div class="td">${esc(r.baslik||"-")}</div><div class="td">${esc(r.detay||"-")}</div></div>`).join("")}</div>` : `<div class="empty">Bu bölüm için kayıt yok.</div>`}
  </div>`;
}
function riskPanel(title, rows) {
  return `<div class="panel"><div class="sectiontitle"><h3>${esc(title)}</h3><span class="badge">${(rows||[]).length} satır</span></div>
    ${(rows||[]).length ? `<div class="table"><div class="tr head risk"><div class="td">Risk</div><div class="td">Önem</div><div class="td">Not</div></div>${rows.map(r=>`<div class="tr risk"><div class="td">${esc(r.risk||"-")}</div><div class="td">${esc(r.onem||"-")}</div><div class="td">${esc(r.not||"-")}</div></div>`).join("")}</div>` : `<div class="empty">Bu bölüm için kayıt yok.</div>`}
  </div>`;
}
function copyTender(id) {
  const t = data.tenders.find(x => x.id === id);
  if(!t) return;
  const text = `İKN: ${t.ikn}
İhale tarihi: ${formatDate(t.ihaleTarihi)}
Kurum: ${t.kurum}
İş adı: ${t.isAdi}
Yer: ${t.yer}
Yaklaşık maliyet: ${t.yaklasikMaliyet}
Önerilen teklif: ${t.onerilenTeklif}
Teminat: ${t.teminat}
İş deneyimi / benzer iş: ${t.isDeneyimi}
Özet: ${t.ozet}`;
  navigator.clipboard?.writeText(text);
  toast("Kopyalandı");
}
function render() {
  renderHome();
  renderAdd();
  renderSaved();
  if(current === "detail") renderDetail();
}
if("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(()=>{})); }
render();
</script>
</body>
