<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070b10" />
  <title>İhale Hafızası</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <style>
    :root{
      --bg:#070b10; --panel:#101821; --panel2:#0b1118; --card:#131d28;
      --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.18);
      --text:#f8fafc; --muted:#94a3b8; --muted2:#64748b;
      --accent:#22d3ee; --accent2:#67e8f9; --danger:#fb7185; --success:#34d399;
      --shadow:0 22px 60px rgba(0,0,0,.35); --radius:28px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 85% 0%,rgba(34,211,238,.13),transparent 32%),radial-gradient(circle at 0% 100%,rgba(59,130,246,.12),transparent 38%)}
    button,input,textarea,select{font:inherit} button{cursor:pointer}
    .app{position:relative;max-width:1180px;margin:0 auto;display:flex;min-height:100vh}
    .side{width:280px;flex:0 0 280px;border-right:1px solid var(--line);background:rgba(13,19,27,.92);backdrop-filter:blur(18px);display:none}
    @media(min-width:980px){.side{display:block}.main{padding:30px!important}.desktop-home{display:grid!important}}
    .main{flex:1;min-width:0;padding:16px}
    .brand{display:flex;align-items:center;gap:12px;margin:12px;padding:12px;border-radius:24px;background:transparent;border:0;color:inherit;width:calc(100% - 24px);text-align:left}
    .brand:hover{background:rgba(255,255,255,.05)}
    .logo{width:48px;height:48px;border-radius:18px;background:var(--accent);color:#061018;display:grid;place-items:center;font-weight:950;font-size:18px;box-shadow:0 16px 35px rgba(34,211,238,.16)}
    .brand-title{font-weight:950;font-size:18px;letter-spacing:-.02em}.brand-sub{font-size:12px;color:var(--muted)}
    .nav{padding:12px;display:grid;gap:6px}.nav button{border:0;border-radius:18px;background:transparent;color:#cbd5e1;text-align:left;padding:13px 14px;font-weight:800;display:flex;gap:10px;align-items:center}.nav button.active{background:var(--accent);color:#061018}.nav button:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
    .top{background:rgba(16,24,33,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:18px;backdrop-filter:blur(18px)}
    .toprow{display:flex;flex-direction:column;gap:14px}@media(min-width:760px){.toprow{flex-direction:row;align-items:center;justify-content:space-between}}
    .top-title{display:flex;gap:12px;align-items:center}.iconbtn{width:46px;height:46px;border:0;border-radius:16px;background:rgba(255,255,255,.08);color:var(--text);display:grid;place-items:center}.iconbtn:hover{background:rgba(255,255,255,.14)}.desktop-home{display:none}
    .eyebrow{color:var(--accent2);font-size:13px;font-weight:800} h1,h2,h3,h4,p{margin:0} h1{font-size:25px;line-height:1.1;letter-spacing:-.04em} h2{font-size:25px;line-height:1.1;letter-spacing:-.04em} h3{font-size:21px;line-height:1.15;letter-spacing:-.03em}
    .searchwrap{position:relative;width:100%}@media(min-width:760px){.searchwrap{width:390px}}.searchwrap span{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted2)}.searchwrap input{height:48px;width:100%;border-radius:17px;border:1px solid var(--line);background:var(--panel2);color:#fff;padding:0 14px 0 44px;outline:0;font-weight:700}.searchwrap input:focus{border-color:rgba(34,211,238,.7);box-shadow:0 0 0 4px rgba(34,211,238,.1)}
    .section{display:none}.section.active{display:block}.panel{background:rgba(16,24,33,.94);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}.panel-head{display:flex;gap:12px;align-items:center;margin-bottom:18px}.panel-icon{width:50px;height:50px;border-radius:18px;background:var(--accent);color:#061018;display:grid;place-items:center;font-size:24px;font-weight:900;flex:0 0 50px}.muted{color:var(--muted);font-size:14px;line-height:1.55}
    .grid{display:grid;gap:14px}@media(min-width:680px){.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}}
    .module-card{border:1px solid var(--line);background:var(--card);border-radius:25px;padding:18px;text-align:left;color:inherit;box-shadow:0 16px 35px rgba(0,0,0,.18);transition:.18s ease;width:100%}.module-card:hover{transform:translateY(-3px);border-color:rgba(34,211,238,.45);background:#172433}.module-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:18px}.module-ico{width:56px;height:56px;border-radius:18px;background:#0a1118;border:1px solid var(--line);color:var(--accent2);display:grid;place-items:center;font-size:28px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;background:rgba(255,255,255,.08);color:#cbd5e1;font-size:12px;font-weight:900}.go{margin-top:16px;color:var(--accent2);font-size:14px;font-weight:950}
    .stats{display:grid;gap:14px;margin-top:18px}@media(min-width:680px){.stats{grid-template-columns:repeat(3,minmax(0,1fr))}}.stat{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 16px 35px rgba(0,0,0,.15)}.stat .v{font-size:24px;font-weight:950;margin-top:6px}
    .split{display:grid;gap:18px}@media(min-width:980px){.split{grid-template-columns:.88fr 1.12fr}}
    .field-grid{display:grid;gap:12px}@media(min-width:680px){.field-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.wide{grid-column:span 2}} label{display:block} label b{display:block;color:#cbd5e1;font-size:12px;margin-bottom:8px}
    input,textarea,select{width:100%;border:1px solid var(--line);background:var(--panel2);color:#fff;border-radius:17px;padding:13px 14px;outline:0;font-weight:650} textarea{min-height:100px;resize:vertical;line-height:1.5} input:focus,textarea:focus,select:focus{border-color:rgba(34,211,238,.7);box-shadow:0 0 0 4px rgba(34,211,238,.1)}
    .btnrow{display:grid;gap:10px;margin-top:12px}@media(min-width:560px){.btnrow{grid-template-columns:1fr 1fr}}.btn{border:0;border-radius:17px;padding:13px 16px;font-weight:950;color:#061018;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.secondary{background:rgba(255,255,255,.09);color:#fff}.btn.ghost{background:rgba(34,211,238,.10);color:var(--accent2);border:1px solid rgba(34,211,238,.22)}
    .record-list{display:grid;gap:12px}.record{border:1px solid var(--line);background:var(--panel2);border-radius:24px;padding:14px;color:inherit;text-align:left;width:100%;transition:.15s ease}.record:hover,.record.active{border-color:rgba(34,211,238,.45);background:rgba(34,211,238,.09)}.record-main{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.record .small{font-size:11px;text-transform:uppercase;color:var(--accent2);font-weight:950;letter-spacing:.04em}.record .title{font-weight:950;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.record .sub{font-size:13px;line-height:1.45;color:var(--muted);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.record .right{font-size:13px;font-weight:950;color:#e2e8f0;text-align:right;white-space:nowrap}.record-actions{display:flex;margin-top:10px;gap:8px;justify-content:flex-end}.tiny{border:0;border-radius:12px;background:rgba(255,255,255,.08);color:#e2e8f0;padding:8px 10px;font-size:12px;font-weight:900}.tiny.danger{color:#fecdd3}
    .info-grid{display:grid;gap:12px}@media(min-width:560px){.info-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}.info{border:1px solid var(--line);background:var(--panel2);border-radius:22px;padding:14px}.info .l{font-size:12px;font-weight:950;color:#a3aab8;margin-bottom:8px}.info .v{font-weight:950}.block{border:1px solid var(--line);background:var(--panel2);border-radius:22px;padding:15px;margin-top:12px}.block.important{border-color:rgba(34,211,238,.25);background:rgba(34,211,238,.09)}.block.danger{border-color:rgba(251,113,133,.25);background:rgba(251,113,133,.08)}.block .bt{font-size:14px;font-weight:950;color:#e2e8f0;margin-bottom:8px}.block.important .bt{color:var(--accent2)}.block.danger .bt{color:#fecdd3}.block p{white-space:pre-wrap;color:#cbd5e1;line-height:1.55;font-size:14px}
    .empty{border:1px dashed var(--line2);background:var(--panel2);border-radius:22px;padding:22px;text-align:center;color:var(--muted);font-weight:700}.drawer{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.64);backdrop-filter:blur(5px);padding:14px}.drawer.open{display:block}.drawerbox{background:#101821;border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:var(--shadow)}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--accent);color:#061018;font-weight:950;padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s;z-index:60}.toast.show{opacity:1;bottom:28px}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <button class="brand" onclick="go('home')"><div class="logo">İH</div><div><div class="brand-title">İhale Hafızası</div><div class="brand-sub">Ana menüye dönmek için tıkla</div></div></button>
      <div class="nav" id="desktopNav"></div>
    </aside>
    <main class="main">
      <header class="top"><div class="toprow"><div class="top-title">
        <button class="iconbtn" onclick="openMenu()">☰</button><button class="iconbtn desktop-home" onclick="go('home')">⌂</button>
        <div><div class="eyebrow">Kişisel iş yönetim paneli</div><h1 id="pageTitle">Ana Menü</h1></div>
      </div><div class="searchwrap"><span>⌕</span><input id="globalSearch" placeholder="İKN, kurum, not, şifre, gelir-gider ara..." oninput="render()" /></div></div></header>
      <section id="home" class="section active"></section><section id="tenderEntry" class="section"></section><section id="savedTenders" class="section"></section><section id="notes" class="section"></section><section id="passwords" class="section"></section><section id="finance" class="section"></section><section id="todos" class="section"></section>
    </main>
  </div>
  <div id="drawer" class="drawer" onclick="closeMenu(event)"><div class="drawerbox"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><button class="brand" style="margin:0;width:auto" onclick="go('home');document.getElementById('drawer').classList.remove('open')"><div class="logo">İH</div><div><div class="brand-title">İhale Hafızası</div><div class="brand-sub">Ana menüye dön</div></div></button><button class="iconbtn" onclick="document.getElementById('drawer').classList.remove('open')">×</button></div><div class="nav" id="mobileNav"></div></div></div>
  <div id="toast" class="toast">Kaydedildi</div>

<script>
const STORAGE_KEY="ihale-hafizasi-pro-html-v1";
const starterTenderText=`İKN: 2026/729923
Kurum: Karaman M Tipi Kapalı ve Açık Ceza İnfaz Kurumu Müdürlüğü
İş adı: 24 Kalem Temizlik Malzemesi Alımı
Yer: Karaman
Yaklaşık maliyet: 1.245.000 TL
Önerilen teklif: 1.078.000 TL
Teminat: 32.340 TL
Önemli tarihler: Teklif son tarihi 12.06.2026 / Teminat geçerlilik 10.07.2026
İş deneyimi / benzer iş: Mal alımı, temizlik malzemesi tedariki
Teklif stratejisi: DMO ve piyasa karşılaştırmasına göre %12-15 kırımla güvenli teklif
Risk notu: Numune, marka/model ve teknik şartname uyumu kontrol edilmeli`;
const modules=[
{id:"tenderEntry",label:"İhale Kaydet",icon:"📄",desc:"ChatGPT’den aldığın ihale notunu yapıştır, kayıt oluşsun."},
{id:"savedTenders",label:"Kayıtlı İhaleler",icon:"🗂️",desc:"Kaydedilen tüm ihaleleri İKN’ye göre gör ve detayına gir."},
{id:"notes",label:"Not Kaydet",icon:"📝",desc:"Konuşma özetleri, iş fikirleri ve genel notlarını sakla."},
{id:"passwords",label:"Şifre Kasası",icon:"🔒",desc:"EKAP, e-Devlet, banka ve iş hesaplarını takip et."},
{id:"finance",label:"Gelir Gider",icon:"💳",desc:"Hakediş, teminat, masraf ve para hareketlerini işle."},
{id:"todos",label:"Yapılacaklar",icon:"✅",desc:"İhale takipleri ve günlük yapılacak işleri yönet."}
];
function uid(){return crypto&&crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)}
const defaultData={tenders:[{id:uid(),ikn:"2026/729923",kurum:"Karaman M Tipi Kapalı ve Açık Ceza İnfaz Kurumu Müdürlüğü",isAdi:"24 Kalem Temizlik Malzemesi Alımı",yer:"Karaman",yaklasikMaliyet:"1.245.000 TL",onerilenTeklif:"1.078.000 TL",teminat:"32.340 TL",tarihler:"Teklif son tarihi 12.06.2026 / Teminat geçerlilik 10.07.2026",isDeneyimi:"Mal alımı, temizlik malzemesi tedariki",strateji:"DMO ve piyasa karşılaştırmasına göre %12-15 kırımla güvenli teklif.",risk:"Numune, marka/model ve teknik şartname uyumu kontrol edilmeli.",durum:"Takipte",createdAt:new Date().toISOString()}],notes:[{id:uid(),title:"ChatGPT Not Formatı",tag:"Sistem",body:"Her konuşma sonunda 'not' dediğimde kopyala-yapıştır formatında ihale özeti alınacak.",createdAt:new Date().toISOString()}],passwords:[{id:uid(),title:"EKAP",username:"kullanıcı adı",password:"örnek-şifre",url:"https://ekap.kik.gov.tr",note:"Ön izleme kaydı. Gerçek sürümde ana parola ve şifreleme olacak.",createdAt:new Date().toISOString()}],transactions:[{id:uid(),type:"Gelir",title:"Örnek hakediş",amount:"250000",date:"2026-05-29",note:"Örnek kayıt"},{id:uid(),type:"Gider",title:"Teminat / dosya masrafı",amount:"32340",date:"2026-05-29",note:"Örnek kayıt"}],todos:[{id:uid(),text:"Yeni ihale dosyasının İKN numarasını kontrol et",priority:"Yüksek",done:false,note:""},{id:uid(),text:"Teminat geçerlilik tarihini takvime işle",priority:"Orta",done:true,note:""}],selected:{savedTenders:null,tenderEntry:null,notes:null,passwords:null,finance:null,todos:null},visiblePasswords:{}};
let state=load(),active="home",formTender=parseTenderText(starterTenderText);
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultData}catch(e){return defaultData}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function q(){return document.getElementById("globalSearch").value.trim().toLocaleLowerCase("tr-TR")}
function filter(list){const s=q();return !s?list:list.filter(x=>JSON.stringify(x).toLocaleLowerCase("tr-TR").includes(s))}
function money(v){const n=Number(String(v||"").replace(/[^0-9,.-]/g,"").replace(/\./g,"").replace(",","."));return Number.isFinite(n)?n:0}
function fmt(v){return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(v||0)}
function dateLabel(v){if(!v)return"-";try{return new Intl.DateTimeFormat("tr-TR").format(new Date(v))}catch(e){return"-"}}
function toast(msg="Kaydedildi"){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1300)}
function parseTenderText(text){const tender={id:uid(),ikn:"",kurum:"",isAdi:"",yer:"",yaklasikMaliyet:"",onerilenTeklif:"",teminat:"",tarihler:"",isDeneyimi:"",strateji:"",risk:"",durum:"Hazırlık",createdAt:new Date().toISOString()};const fields=[[["İKN","IKN"],"ikn"],[["Kurum"],"kurum"],[["İş adı","Is adi","İşin adı"],"isAdi"],[["Yer","İl","İl / ilçe"],"yer"],[["Yaklaşık maliyet","Kurum yaklaşık maliyeti"],"yaklasikMaliyet"],[["Önerilen teklif","Teklif","Fiyat teklifi"],"onerilenTeklif"],[["Teminat"],"teminat"],[["Önemli tarihler","Tarihler"],"tarihler"],[["İş deneyimi / benzer iş","İş deneyimi","Benzer iş"],"isDeneyimi"],[["Teklif stratejisi","Strateji"],"strateji"],[["Risk notu","Risk"],"risk"]];text.split(/\n+/).forEach(raw=>{const line=raw.trim(),idx=line.indexOf(":");if(idx<0)return;const label=line.slice(0,idx).trim().toLocaleLowerCase("tr-TR"),value=line.slice(idx+1).trim();const found=fields.find(([keys])=>keys.some(k=>k.toLocaleLowerCase("tr-TR")===label));if(found)tender[found[1]]=value});return tender}
function go(id){active=id;document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.getElementById("pageTitle").textContent=id==="home"?"Ana Menü":modules.find(m=>m.id===id)?.label||"Ana Menü";document.getElementById("drawer").classList.remove("open");window.scrollTo({top:0,behavior:"smooth"});render()}
function openMenu(){document.getElementById("drawer").classList.add("open")}
function closeMenu(e){if(e.target.id==="drawer")document.getElementById("drawer").classList.remove("open")}
function countFor(m){return m.id==="tenderEntry"||m.id==="savedTenders"?state.tenders.length:m.id==="notes"?state.notes.length:m.id==="passwords"?state.passwords.length:m.id==="finance"?state.transactions.length:state.todos.length}
function navHtml(){return `<button class="${active==="home"?"active":""}" onclick="go('home')">⌂ Ana Menü</button>`+modules.map(m=>`<button class="${active===m.id?"active":""}" onclick="go('${m.id}')">${m.icon} ${m.label}</button>`).join("")}
function setField(obj,field,id){obj[field]=document.getElementById(id).value}
function recordCard(kind,item,activeId,title,eyebrow,subtitle,right=""){return `<div class="record ${activeId===item.id?"active":""}"><button class="record" style="padding:0;border:0;background:transparent" onclick="selectRecord('${kind}','${item.id}')"><div class="record-main"><div style="min-width:0"><div class="small">${esc(eyebrow)}</div><div class="title">${esc(title)}</div><div class="sub">${esc(subtitle)}</div></div><div class="right">${esc(right)}</div></div></button><div class="record-actions">${kind==="todos"?`<button class="tiny" onclick="toggleTodo('${item.id}')">Durum</button>`:""}<button class="tiny danger" onclick="deleteRecord('${kind}','${item.id}')">Sil</button></div></div>`}
function selectRecord(kind,id){state.selected[kind]=id;save();render()}
function deleteRecord(kind,id){if(!confirm("Bu kayıt silinsin mi?"))return;const map={savedTenders:"tenders",tenderEntry:"tenders",notes:"notes",passwords:"passwords",finance:"transactions",todos:"todos"};state[map[kind]]=state[map[kind]].filter(x=>x.id!==id);if(state.selected[kind]===id)state.selected[kind]=null;save();render()}
function toggleTodo(id){state.todos=state.todos.map(x=>x.id===id?{...x,done:!x.done}:x);save();render()}
function detailBlock(title,text,cls=""){return `<div class="block ${cls}"><div class="bt">${esc(title)}</div><p>${esc(text||"-")}</p></div>`}
function tenderDetail(item){if(!item)return `<div class="empty">Detay görmek için ihale seç.</div>`;return `<div><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px"><div><span class="pill" style="background:rgba(34,211,238,.10);color:var(--accent2)">${esc(item.ikn||"İKN yok")}</span><h3 style="margin-top:12px">${esc(item.isAdi||"İhale detayı")}</h3><p class="muted">${esc(item.kurum||"")}</p></div><button class="iconbtn" onclick="copyTender('${item.id}')">⧉</button></div><div class="info-grid"><div class="info"><div class="l">Yer</div><div class="v">${esc(item.yer||"-")}</div></div><div class="info"><div class="l">Durum</div><div class="v">${esc(item.durum||"-")}</div></div><div class="info"><div class="l">Yaklaşık Maliyet</div><div class="v">${esc(item.yaklasikMaliyet||"-")}</div></div><div class="info"><div class="l">Teminat</div><div class="v">${esc(item.teminat||"-")}</div></div></div>${detailBlock("Önerilen Teklif",item.onerilenTeklif,"important")}${detailBlock("Önemli Tarihler",item.tarihler)}${detailBlock("İş Deneyimi / Benzer İş",item.isDeneyimi)}${detailBlock("Teklif Stratejisi",item.strateji)}${detailBlock("Risk Notu",item.risk,"danger")}</div>`}
function copyTender(id){const i=state.tenders.find(x=>x.id===id);if(!i)return;const text=`İKN: ${i.ikn}\nKurum: ${i.kurum}\nİş adı: ${i.isAdi}\nYer: ${i.yer}\nYaklaşık maliyet: ${i.yaklasikMaliyet}\nÖnerilen teklif: ${i.onerilenTeklif}\nTeminat: ${i.teminat}\nÖnemli tarihler: ${i.tarihler}\nİş deneyimi / benzer iş: ${i.isDeneyimi}\nTeklif stratejisi: ${i.strateji}\nRisk notu: ${i.risk}`;navigator.clipboard?.writeText(text);toast("Kopyalandı")}
function renderHome(){const gelir=state.transactions.filter(x=>x.type==="Gelir").reduce((s,x)=>s+money(x.amount),0),gider=state.transactions.filter(x=>x.type==="Gider").reduce((s,x)=>s+money(x.amount),0);let results="";if(q()){const groups=[["savedTenders","Kayıtlı İhale",state.tenders,x=>x.isAdi||x.ikn,x=>`${x.ikn||""} ${x.kurum||""} ${x.yer||""}`],["notes","Not",state.notes,x=>x.title,x=>x.body],["passwords","Şifre",state.passwords,x=>x.title,x=>x.username||x.url],["finance","Gelir Gider",state.transactions,x=>x.title,x=>`${x.type} ${x.amount} ${x.note||""}`],["todos","Yapılacak",state.todos,x=>x.text,x=>x.note||x.priority]];const found=groups.flatMap(g=>filter(g[2]).map(item=>({module:g[0],label:g[1],title:g[3](item),sub:g[4](item)})));results=`<div class="panel"><h3>Arama Sonuçları</h3><p class="muted">Arama tüm kayıtların içinde çalışır.</p><div class="grid two" style="margin-top:14px">${found.length?found.map(r=>`<button class="module-card" onclick="go('${r.module}')"><div class="small">${esc(r.label)}</div><h4 style="margin-top:6px">${esc(r.title)}</h4><p class="muted">${esc(r.sub)}</p></button>`).join(""):`<div class="empty">Aramaya uygun kayıt bulunamadı.</div>`}</div></div>`}
document.getElementById("home").innerHTML=`<div class="panel"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin-bottom:18px"><div><h2>Bölümler</h2><p class="muted">Android koyu tema düzeni. Bölüme dokun, işlem ekranına geç.</p></div><span class="pill" style="background:rgba(34,211,238,.1);color:var(--accent2)">6 ana bölüm</span></div><div class="grid three">${modules.map(m=>`<button class="module-card" onclick="go('${m.id}')"><div class="module-top"><div class="module-ico">${m.icon}</div><span class="pill">${countFor(m)} kayıt</span></div><h3>${m.label}</h3><p class="muted">${m.desc}</p><div class="go">Bölüme gir →</div></button>`).join("")}</div></div><div class="stats"><div class="stat"><div class="muted">Kayıtlı ihale</div><div class="v">${state.tenders.length}</div></div><div class="stat"><div class="muted">Net gelir gider</div><div class="v">${fmt(gelir-gider)}</div></div><div class="stat"><div class="muted">Açık görev</div><div class="v">${state.todos.filter(x=>!x.done).length}</div></div></div>${results}`}
function renderTenderEntry(){const list=filter(state.tenders).slice(0,5);const selected=state.tenders.find(x=>x.id===(state.selected.tenderEntry||state.tenders[0]?.id));document.getElementById("tenderEntry").innerHTML=`<div class="panel"><div class="panel-head"><div class="panel-icon">📄</div><div><h2>İhale Kaydet</h2><p class="muted">Üstte yeni ihale ekle. Sonra Kayıtlı İhaleler bölümünden kolayca bul.</p></div></div><div class="split"><div><label><b>ChatGPT’den gelen metni yapıştır</b><textarea id="pasteTender">${esc(starterTenderText)}</textarea></label><div class="btnrow"><button class="btn secondary" onclick="parseTenderFromBox()">✨ Alanlara Dağıt</button><button class="btn" onclick="saveTender()">💾 İhaleyi Kaydet</button></div><button class="btn ghost" style="width:100%;margin-top:10px" onclick="go('savedTenders')">Kayıtlı İhaleler bölümüne git</button></div><div class="field-grid">${tenderFieldsHtml()}</div></div></div><div class="split"><div class="panel"><h3>Son Kaydedilen İhaleler</h3><div class="record-list" style="margin-top:14px">${list.length?list.map(i=>recordCard("tenderEntry",i,selected?.id,i.isAdi||"İsimsiz ihale",i.ikn||"İKN yok",`${i.kurum||"Kurum yok"} • ${i.yer||"Yer yok"}`,i.onerilenTeklif||i.yaklasikMaliyet||"-")).join(""):`<div class="empty">Kayıtlı ihale bulunamadı.</div>`}</div></div><div class="panel">${tenderDetail(selected)}</div></div>`;fillTenderForm()}
function tenderFieldsHtml(){const fields=[["ikn","İKN"],["durum","Durum"],["kurum","Kurum","wide"],["isAdi","İş adı","wide"],["yer","Yer"],["yaklasikMaliyet","Yaklaşık maliyet"],["onerilenTeklif","Önerilen teklif"],["teminat","Teminat"],["tarihler","Önemli tarihler","wide","area"],["isDeneyimi","İş deneyimi / benzer iş","wide","area"],["strateji","Teklif stratejisi","wide","area"],["risk","Risk notu","wide","area"]];return fields.map(f=>`<label class="${f[2]||""}"><b>${f[1]}</b>${f[3]==="area"?`<textarea id="tf_${f[0]}"></textarea>`:`<input id="tf_${f[0]}" />`}</label>`).join("")}
function fillTenderForm(){["ikn","durum","kurum","isAdi","yer","yaklasikMaliyet","onerilenTeklif","teminat","tarihler","isDeneyimi","strateji","risk"].forEach(k=>{const el=document.getElementById("tf_"+k);if(el)el.value=formTender[k]||""})}
function readTenderForm(){["ikn","durum","kurum","isAdi","yer","yaklasikMaliyet","onerilenTeklif","teminat","tarihler","isDeneyimi","strateji","risk"].forEach(k=>{formTender[k]=document.getElementById("tf_"+k)?.value||""})}
function parseTenderFromBox(){formTender=parseTenderText(document.getElementById("pasteTender").value);renderTenderEntry();toast("Alanlara dağıtıldı")}
function saveTender(){readTenderForm();const item={...formTender,id:formTender.id||uid(),createdAt:formTender.createdAt||new Date().toISOString()};state.tenders=[item,...state.tenders.filter(x=>x.id!==item.id&&x.ikn!==item.ikn)];state.selected.tenderEntry=item.id;state.selected.savedTenders=item.id;save();toast("İhale kaydedildi");render()}
function renderSavedTenders(){const list=filter(state.tenders);const selected=state.tenders.find(x=>x.id===(state.selected.savedTenders||state.tenders[0]?.id))||list[0];document.getElementById("savedTenders").innerHTML=`<div class="split"><div class="panel"><div class="panel-head"><div class="panel-icon">🗂️</div><div><h2>Kayıtlı İhaleler</h2><p class="muted">Kaydedilen tüm ihaleler burada. Kartına tıkla, detayını gör.</p></div></div><div class="record-list">${list.length?list.map(i=>recordCard("savedTenders",i,selected?.id,i.isAdi||"İsimsiz ihale",i.ikn||"İKN yok",`${i.kurum||"Kurum yok"} • ${i.yer||"Yer yok"}`,i.onerilenTeklif||i.yaklasikMaliyet||"-")).join(""):`<div class="empty">Kayıtlı ihale bulunamadı.</div>`}</div></div><div class="panel">${tenderDetail(selected)}</div></div>`}
function simpleSection(kind, title, icon, desc, listTitle, fields, listFn, detailFn, saveFn){const list=filter(state[kind]);const selected=list.find(x=>x.id===(state.selected[kind]))||list[0];document.getElementById(kind).innerHTML=`<div class="panel"><div class="panel-head"><div class="panel-icon">${icon}</div><div><h2>${title}</h2><p class="muted">${desc}</p></div></div><div class="field-grid">${fields}</div><button class="btn" style="margin-top:12px;width:100%" onclick="${saveFn}">💾 Kaydet</button></div><div class="split"><div class="panel"><h3>${listTitle}</h3><div class="record-list" style="margin-top:14px">${list.length?list.map(i=>listFn(i,selected?.id)).join(""):`<div class="empty">Kayıt bulunamadı.</div>`}</div></div><div class="panel">${selected?detailFn(selected):`<div class="empty">Detay için kayıt seç.</div>`}</div></div>`}
function renderNotes(){simpleSection("notes","Not Kaydet","📝","Üstte not ekle; altta kayıtlı notlara tıklayınca detay görünür.","Kayıtlı Notlar",`<label><b>Başlık</b><input id="note_title"></label><label><b>Etiket</b><input id="note_tag" value="Genel"></label><label class="wide"><b>Not</b><textarea id="note_body"></textarea></label>`,(i,a)=>recordCard("notes",i,a,i.title,i.tag,i.body,dateLabel(i.createdAt)),i=>`<span class="pill">${esc(i.tag)}</span><h3 style="margin-top:12px">${esc(i.title)}</h3>${detailBlock("Not",i.body)}`,"saveNote()")}
function saveNote(){const title=document.getElementById("note_title").value,tag=document.getElementById("note_tag").value||"Genel",body=document.getElementById("note_body").value;if(!title&&!body)return;const item={id:uid(),title:title||"Başlıksız not",tag,body,createdAt:new Date().toISOString()};state.notes=[item,...state.notes];state.selected.notes=item.id;save();toast("Not kaydedildi");render()}
function renderPasswords(){simpleSection("passwords","Şifre Kasası","🔒","Ön izleme. Gerçek sürümde ana parola ve cihaz içi şifreleme yapılmalı.","Kayıtlı Şifreler",`<div class="wide block" style="margin:0;border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.08)"><p>Gerçek uygulamada şifreler düz metin tutulmaz. Bu sadece tasarım ön izlemesidir.</p></div><label><b>Başlık</b><input id="pw_title"></label><label><b>Kullanıcı adı</b><input id="pw_user"></label><label><b>Şifre</b><input id="pw_pass"></label><label><b>Link</b><input id="pw_url"></label><label class="wide"><b>Not</b><textarea id="pw_note"></textarea></label>`,(i,a)=>recordCard("passwords",i,a,i.title,"Şifre",i.username||i.url,"••••"),i=>`<span class="pill">Şifre Kaydı</span><h3 style="margin-top:12px">${esc(i.title)}</h3><p class="muted">${esc(i.username||"")}</p>${detailBlock("Şifre",state.visiblePasswords[i.id]?i.password:"••••••••••••","important")}<button class="btn secondary" onclick="togglePw('${i.id}')">Göster / Gizle</button>${detailBlock("Link",i.url)}${detailBlock("Not",i.note)}`,"savePassword()")}
function savePassword(){const item={id:uid(),title:document.getElementById("pw_title").value,username:document.getElementById("pw_user").value,password:document.getElementById("pw_pass").value,url:document.getElementById("pw_url").value,note:document.getElementById("pw_note").value,createdAt:new Date().toISOString()};if(!item.title)return;state.passwords=[item,...state.passwords];state.selected.passwords=item.id;save();toast("Şifre kaydedildi");render()}
function togglePw(id){state.visiblePasswords[id]=!state.visiblePasswords[id];save();render()}
function renderFinance(){const gelir=state.transactions.filter(x=>x.type==="Gelir").reduce((s,x)=>s+money(x.amount),0),gider=state.transactions.filter(x=>x.type==="Gider").reduce((s,x)=>s+money(x.amount),0);simpleSection("finance","Gelir Gider","💳",`Toplam gelir: ${fmt(gelir)} • Toplam gider: ${fmt(gider)} • Net: ${fmt(gelir-gider)}`,"Kayıtlı Para Hareketleri",`<label><b>Tip</b><select id="tr_type"><option>Gelir</option><option selected>Gider</option></select></label><label><b>Başlık</b><input id="tr_title"></label><label><b>Tutar</b><input id="tr_amount"></label><label><b>Tarih</b><input id="tr_date" value="${new Date().toISOString().slice(0,10)}"></label><label class="wide"><b>Not</b><textarea id="tr_note"></textarea></label>`,(i,a)=>recordCard("finance",i,a,i.title,i.type,`${i.date} • ${i.note||"not yok"}`,fmt(money(i.amount))),i=>`<span class="pill">${esc(i.type)}</span><h3 style="margin-top:12px">${esc(i.title)}</h3>${detailBlock("Tutar",fmt(money(i.amount)),"important")}${detailBlock("Tarih",i.date)}${detailBlock("Not",i.note)}`,"saveTransaction()")}
function saveTransaction(){const item={id:uid(),type:document.getElementById("tr_type").value,title:document.getElementById("tr_title").value,amount:document.getElementById("tr_amount").value,date:document.getElementById("tr_date").value,note:document.getElementById("tr_note").value};if(!item.title&&!item.amount)return;state.transactions=[item,...state.transactions];state.selected.finance=item.id;save();toast("Kayıt eklendi");render()}
function renderTodos(){simpleSection("todos","Yapılacaklar","✅","Üstte yeni görev ekle; altta görevler listelenir.","Kayıtlı Görevler",`<label class="wide"><b>Görev</b><input id="todo_text"></label><label><b>Öncelik</b><select id="todo_priority"><option>Yüksek</option><option selected>Orta</option><option>Düşük</option></select></label><label class="wide"><b>Not</b><textarea id="todo_note"></textarea></label>`,(i,a)=>recordCard("todos",i,a,i.text,i.done?"Tamamlandı":i.priority,i.note||"Görev notu yok",i.done?"✓":""),i=>`<span class="pill">${esc(i.done?"Tamamlandı":i.priority)}</span><h3 style="margin-top:12px">${esc(i.text)}</h3>${detailBlock("Not",i.note||"Görev notu yok.")}`,"saveTodo()")}
function saveTodo(){const item={id:uid(),text:document.getElementById("todo_text").value,priority:document.getElementById("todo_priority").value,note:document.getElementById("todo_note").value,done:false};if(!item.text)return;state.todos=[item,...state.todos];state.selected.todos=item.id;save();toast("Görev eklendi");render()}
function render(){document.getElementById("desktopNav").innerHTML=navHtml();document.getElementById("mobileNav").innerHTML=navHtml();renderHome();renderTenderEntry();renderSavedTenders();renderNotes();renderPasswords();renderFinance();renderTodos()}
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}))}
render();
</script>
</body>
</html>
