}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}
function daysInfo(t) {
  if(!t.ihaleTarihi) return { text:"Tarih yok", cls:"unknown" };
  const target = new Date(t.ihaleTarihi);
  if(Number.isNaN(target.getTime())) return { text:"Tarih okunamadı", cls:"unknown" };
  const now = new Date();
  const ms = 1000*60*60*24;
  const status = String(t.durum || "").toLocaleLowerCase("tr-TR");
  const doneGood = status.includes("kazan") || status.includes("sonuç") || status.includes("tamam");
  if(target >= now) {
    const d = Math.max(0, Math.ceil((target - now)/ms));
    return { text: d === 0 ? "Bugün ihale günü" : d + " gün kaldı", cls:"future" };
  }
  const d = Math.max(0, Math.ceil((now - target)/ms));
  return { text: d === 0 ? "Bugün geçti" : d + " gün geçti", cls: doneGood ? "done" : "past" };
}
function formatDate(v) {
  if(!v) return "-";
  const d = new Date(v);
  if(Number.isNaN(d.getTime())) return v;
  return new Intl.DateTimeFormat("tr-TR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" }).format(d);
}
function tenderSort(a,b) {
  if(!a.ihaleTarihi && !b.ihaleTarihi) return a.ikn.localeCompare(b.ikn, "tr");
  if(!a.ihaleTarihi) return 1;
  if(!b.ihaleTarihi) return -1;
  return new Date(a.ihaleTarihi) - new Date(b.ihaleTarihi);
}
function renderHome() {
  document.getElementById("home").innerHTML = `
    <div class="homegrid">
      <button class="homecard" onclick="go('add')">
        <div class="homeicon">📄</div>
        <div class="title">İhale Kaydet</div>
        <p class="muted">ChatGPT notunu yapıştır, ihale kaydı oluştur.</p>
        <div class="go">Bölüme gir →</div>
      </button>
      <button class="homecard" onclick="go('saved')">
        <div class="homeicon">🗂️</div>
        <div class="title">Kayıtlı İhaleler</div>
        <p class="muted">${data.tenders.length} ihale kayıtlı. İKN’ye dokun, detayını gör.</p>
        <div class="go">Bölüme gir →</div>
      </button>
    </div>
    <div class="panel" style="margin-top:12px">
      <h2>Özet</h2>
      <p class="muted" style="margin-top:6px">Uygulama artık sadece ihale kaydetme ve kayıtlı ihaleleri takip etme üzerine kuruldu.</p>
    </div>
  `;
}
function parseTenderText(text) {
  const t = emptyTender();
  const map = [
    [["İKN","IKN"],"ikn"],
    [["İhale tarihi","Teklif tarihi","Teklif son tarihi","Tarih"],"ihaleTarihi"],
    [["Kurum"],"kurum"],
    [["İş adı","İşin adı","Is adi"],"isAdi"],
    [["Yer","İl","İl / ilçe"],"yer"],
    [["Yaklaşık maliyet","Kurum yaklaşık maliyeti"],"yaklasikMaliyet"],
    [["Önerilen teklif","Teklif","Fiyat teklifi"],"onerilenTeklif"],
    [["Teminat"],"teminat"],
    [["İş deneyimi / benzer iş","İş deneyimi","Benzer iş"],"isDeneyimi"],
    [["Teklif stratejisi","Strateji"],"strateji"],
    [["Risk notu","Risk"],"risk"],
    [["Durum"],"durum"],
    [["Not"],"not"]
  ];
  text.split(/\n+/).forEach(raw => {
    const line = raw.trim();
    const idx = line.indexOf(":");
    if(idx < 0) return;
    const label = line.slice(0,idx).trim().toLocaleLowerCase("tr-TR");
    const value = line.slice(idx+1).trim();
    const found = map.find(([keys]) => keys.some(k => k.toLocaleLowerCase("tr-TR") === label));
    if(found) t[found[1]] = normalizeDateValue(value, found[1]);
  });
  return t;
}
function normalizeDateValue(value, field) {
  if(field !== "ihaleTarihi") return value;
  if(!value) return "";
  const iso = value.match(/(20\d{2})-(\d{2})-(\d{2})[ T]?(\d{2})?:?(\d{2})?/);
  if(iso) return `${iso[1]}-${iso[2]}-${iso[3]}T${iso[4]||"10"}:${iso[5]||"00"}`;
  const tr = value.match(/(\d{1,2})[./](\d{1,2})[./](20\d{2}).*?(\d{1,2})?:?(\d{2})?/);
  if(tr) return `${tr[3]}-${tr[2].padStart(2,"0")}-${tr[1].padStart(2,"0")}T${(tr[4]||"10").padStart(2,"0")}:${tr[5]||"00"}`;
  return value;
}
function renderAdd() {
  document.getElementById("add").innerHTML = `
    <div class="panel">
      <div class="panelhead">
        <div><h2>İhale Kaydet</h2><p class="muted">Benim verdiğim notu yapıştır veya alanları elle doldur.</p></div>
        <button class="back" onclick="go('home')">Ana Menü</button>
      </div>
      <label class="wide"><b>ChatGPT ihale notu</b><textarea id="pasteBox">${esc(starterText)}</textarea></label>
      <div class="btnrow">
        <button class="btn secondary" onclick="parseBox()">Alanlara Dağıt</button>
        <button class="btn" onclick="saveTender()">İhaleyi Kaydet</button>
      </div>
    </div>
    <div class="panel">
      <div class="fields">
        ${field("ikn","İKN")}
        ${field("ihaleTarihi","İhale tarihi","datetime-local")}
        ${field("durum","Durum")}
        ${field("kurum","Kurum","text","wide")}
        ${field("isAdi","İş adı","text","wide")}
        ${field("yer","Yer")}
        ${field("yaklasikMaliyet","Yaklaşık maliyet")}
        ${field("onerilenTeklif","Önerilen teklif")}
        ${field("teminat","Teminat")}
        ${area("isDeneyimi","İş deneyimi / benzer iş")}
        ${area("strateji","Teklif stratejisi")}
        ${area("risk","Risk notu")}
        ${area("not","Ek not")}
      </div>
    </div>
  `;
  fillDraft();
}
function field(id,label,type="text",cls="") { return `<label class="${cls}"><b>${label}</b><input id="f_${id}" type="${type}"></label>`; }
function area(id,label) { return `<label class="wide"><b>${label}</b><textarea id="f_${id}"></textarea></label>`; }
function fillDraft() {
  Object.keys(draft).forEach(k => {
    const el = document.getElementById("f_" + k);
    if(el) el.value = draft[k] || "";
  });
}
function readDraft() {
  Object.keys(draft).forEach(k => {
    const el = document.getElementById("f_" + k);
    if(el) draft[k] = el.value;
  });
}
function parseBox() {
  draft = parseTenderText(document.getElementById("pasteBox").value);
  renderAdd();
  toast("Alanlara dağıtıldı");
}
function saveTender() {
  readDraft();
  if(!draft.ikn) { toast("İKN boş bırakılamaz"); return; }
  const item = {...draft, id: draft.id || uid()};
  data.tenders = [item, ...data.tenders.filter(t => t.id !== item.id && t.ikn !== item.ikn)];
  data.selectedTender = item.id;
  save();
  draft = emptyTender();
  toast("İhale kaydedildi");
  go("saved");
}
function renderSaved() {
  const list = filterTenders().sort(tenderSort);
  const selected = data.tenders.find(t => t.id === data.selectedTender) || list[0];
  document.getElementById("saved").innerHTML = `
    <div class="panel">
      <div class="panelhead">
        <div><h2>Kayıtlı İhaleler</h2><p class="muted">Listede sadece İKN ve kalan/geçen gün görünür. İKN’ye dokununca detay açılır.</p></div>
        <button class="back" onclick="go('home')">Ana Menü</button>
      </div>
      <div class="list">
        ${list.length ? list.map(row).join("") : `<div class="empty">Kayıtlı ihale bulunamadı.</div>`}
      </div>
    </div>
    <div class="panel">
      ${selected ? detail(selected) : `<div class="empty">Detay görmek için bir İKN seç.</div>`}
    </div>
  `;
}
function row(t) {
  const d = daysInfo(t);
  return `<button class="tenderrow ${d.cls}" onclick="selectTender('${t.id}')">
    <div><div class="ikn">${esc(t.ikn)}</div><div class="days">${esc(d.text)}</div></div>
    <span class="badge">${esc(t.durum || "Takipte")}</span>
  </button>`;
}
function selectTender(id) {
  data.selectedTender = id;
  save();
  renderSaved();
  setTimeout(() => {
    const panels = document.querySelectorAll("#saved .panel");
    if(panels[1]) panels[1].scrollIntoView({behavior:"smooth", block:"start"});
  }, 50);
}
function detail(t) {
  const d = daysInfo(t);
  return `
    <div class="detailtop">
      <div>
        <div class="smallpill">${esc(t.ikn)}</div>
        <h3>${esc(t.isAdi || "İhale detayı")}</h3>
        <p class="muted">${esc(d.text)} • ${esc(t.durum || "Takipte")}</p>
      </div>
      <button class="back" onclick="copyTender('${t.id}')">Kopyala</button>
    </div>
    ${info("İhale tarihi", formatDate(t.ihaleTarihi))}
    ${info("Kurum", t.kurum)}
    ${info("Yer", t.yer)}
    ${info("Yaklaşık maliyet", t.yaklasikMaliyet)}
    ${info("Önerilen teklif", t.onerilenTeklif)}
    ${info("Teminat", t.teminat)}
    ${info("İş deneyimi / benzer iş", t.isDeneyimi)}
    ${info("Teklif stratejisi", t.strateji)}
    ${info("Risk notu", t.risk)}
    ${info("Ek not", t.not)}
  `;
}
function info(label,value) { return `<div class="info"><div class="l">${esc(label)}</div><div class="v">${esc(value || "-")}</div></div>`; }
function copyTender(id) {
  const t = data.tenders.find(x => x.id === id);
  if(!t) return;
  const text = `İKN: ${t.ikn}
İhale tarihi: ${formatDate(t.ihaleTarihi)}
Kurum: ${t.kurum}
İş adı: ${t.isAdi}
Yer: ${t.yer}
Yaklaşık maliyet: ${t.yaklasikMaliyet}
Önerilen teklif: ${t.onerilenTeklif}
Teminat: ${t.teminat}
İş deneyimi / benzer iş: ${t.isDeneyimi}
Teklif stratejisi: ${t.strateji}
Risk notu: ${t.risk}
Not: ${t.not}`;
  navigator.clipboard?.writeText(text);
  toast("Kopyalandı");
}
function render() {
  renderHome();
  renderAdd();
  renderSaved();
}
if("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(()=>{})); }
render();
</script>
